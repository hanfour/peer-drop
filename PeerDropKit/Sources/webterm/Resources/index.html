<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/vendor/xterm.css">
<style>
  html,body{height:100%;margin:0;background:#000;color:#ddd;font-family:Menlo,monospace}
  #term{height:100%;display:none}
  #picker{padding:24px;max-width:560px;margin:0 auto}
  #picker h1{font-size:16px;color:#888;font-weight:normal}
  .preset{display:block;width:100%;text-align:left;background:#111;color:#ddd;border:1px solid #333;
          border-radius:6px;padding:12px 14px;margin:8px 0;cursor:pointer;font-family:inherit;font-size:14px}
  .preset:hover{background:#1a1a1a;border-color:#555}
  .preset .run{color:#5c5;font-size:12px;margin-left:8px}
  #switch{display:none;position:fixed;top:6px;right:8px;z-index:11;background:#222;color:#ccc;
          border:1px solid #444;border-radius:5px;padding:4px 8px;cursor:pointer;font-family:inherit;font-size:12px}
</style></head><body>
<div id="picker"><h1>webterm — choose a session</h1><div id="presets"></div></div>
<div id="term"></div>
<button id="switch">≡ sessions</button>
<script src="/vendor/xterm.js"></script>
<script src="/vendor/xterm-addon-fit.js"></script>
<script src="/app.js"></script></body></html>
