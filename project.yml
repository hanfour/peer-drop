name: PeerDrop
options:
  bundleIdPrefix: com.peerdrop
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC
    exactVersion: 125.0.0
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"  # iPhone and iPad
    SWIFT_EMIT_LOC_STRINGS: "NO"

targets:
  PeerDrop:
    type: application
    platform: iOS
    sources:
      - path: PeerDrop
        # Pets/ is registered separately as a folder reference below — exclude
        # it from the default per-file scan so we don't get 324 PBXFileReference
        # entries cluttering the project file.
        excludes:
          - "Resources/Pets/**"
      - path: PeerDrop/Resources/Pets
        type: folder
    dependencies:
      - package: WebRTC
      - package: ZIPFoundation
      - target: PeerDropWidget
    settings:
      base:
        INFOPLIST_FILE: PeerDrop/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.hanfour.peerdrop
        DEVELOPMENT_TEAM: UK48R5KWLV
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "4.0.1"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: PeerDrop/App/PeerDrop.entitlements
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    entitlements:
      path: PeerDrop/App/PeerDrop.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.hanfour.peerdrop
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.hanfour.peerdrop
        com.apple.security.application-groups:
          - group.com.hanfour.peerdrop
    info:
      path: PeerDrop/App/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: PeerDrop
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - peerdrop
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: "PeerDrop uses the local network to discover and connect to nearby devices for file transfer and voice calls."
        NSBonjourServices:
          - "_peerdrop._tcp"
        NSMicrophoneUsageDescription: "PeerDrop needs microphone access for voice calls."
        NSBluetoothAlwaysUsageDescription: "PeerDrop uses Bluetooth to discover nearby devices for file sharing."
        NSNearbyInteractionUsageDescription: "PeerDrop uses Nearby Interaction to measure the distance and direction of nearby devices for precise file sharing."
        NSCameraUsageDescription: "PeerDrop needs camera access to capture photos for sharing in chats."
        NSPhotoLibraryUsageDescription: "PeerDrop needs photo library access to share photos and videos in chats."
        PeerDropWorkerAPIKey: "$(PEERDROP_WORKER_API_KEY)"
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - voip
          - bluetooth-central
          - bluetooth-peripheral
          - remote-notification
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown

  PeerDropTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PeerDropTests
        # Same folder-reference treatment as the main app for the test fixtures
        # at PeerDropTests/Resources/Pets/. M0's spike loader and M3.3's decoder
        # tests load via subdirectory: "Pets" (matching the production layout).
        excludes:
          - "Resources/Pets/**"
          - "Pet/Fixtures/**"
      - path: PeerDropTests/Resources/Pets
        type: folder
    dependencies:
      - target: PeerDrop
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peerdrop.tests
        GENERATE_INFOPLIST_FILE: "YES"

  PeerDropUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - PeerDropUITests
    dependencies:
      - target: PeerDrop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peerdrop.uitests
        GENERATE_INFOPLIST_FILE: "YES"

  PeerDropWidget:
    type: app-extension
    platform: iOS
    sources:
      - PeerDropWidget
      - path: PeerDrop/Pet/Shared
      # PetPalettes is the only Renderer/ file the widget still needs — it
      # provides ColorPalette typedefs referenced by Pet/Model. After M8's
      # full deletion of the legacy sprite stack, widget gets pre-rendered
      # CGImages from the App Group bridge (SharedRenderedPet) and renders
      # nothing itself — no need for PaletteSwap/Compositor/SpriteData/etc.
      #
      # Files are referenced by path so the widget compiles them, but no
      # explicit `group:` override — Xcode navigator uses the natural
      # parent-dir group (Model / Renderer) to avoid "file in multiple
      # groups" warnings (would conflict with PeerDrop target).
      - path: PeerDrop/Pet/Renderer/PetPalettes.swift
      - path: PeerDrop/Pet/Model/PetGenome.swift
      - path: PeerDrop/Pet/Model/PetLevel.swift
      - path: PeerDrop/Pet/Model/PetAction.swift
      - path: PeerDrop/Pet/Model/PetMood.swift
      - path: PeerDrop/Pet/Model/PetSurface.swift
      - path: PeerDrop/Pet/Model/InteractionType.swift
    info:
      path: PeerDropWidget/Info.plist
      properties:
        CFBundleDisplayName: PeerDrop Widget
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hanfour.peerdrop.widget
        DEVELOPMENT_TEAM: UK48R5KWLV
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "4.0.1"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: PeerDropWidget/PeerDropWidget.entitlements
    entitlements:
      path: PeerDropWidget/PeerDropWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.hanfour.peerdrop

schemes:
  PeerDrop:
    build:
      targets:
        PeerDrop: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PeerDropTests
    profile:
      config: Release
    archive:
      config: Release

  PeerDropUITests:
    build:
      targets:
        PeerDrop: all
        PeerDropUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PeerDropUITests
