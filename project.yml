name: PeerDrop
options:
  bundleIdPrefix: com.peerdrop
  deploymentTarget:
    iOS: "16.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  # WebRTC + ZIPFoundation are no longer declared at the project level —
  # both reach the app target transitively via PeerDropKit (WebRTC via
  # PeerDropTransport, ZIPFoundation via PeerDropPet). Pinned versions
  # live in PeerDropKit/Package.swift.
  PeerDropKit:
    path: PeerDropKit

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"  # iPhone and iPad
    SWIFT_EMIT_LOC_STRINGS: "NO"

targets:
  PeerDrop:
    type: application
    platform: iOS
    sources:
      - path: PeerDrop
    dependencies:
      - package: PeerDropKit
        product: PeerDropPlatform
      - package: PeerDropKit
        product: PeerDropCore
      - package: PeerDropKit
        product: PeerDropTransport
      - package: PeerDropKit
        product: PeerDropSecurity
      - package: PeerDropKit
        product: PeerDropProtocol
      - package: PeerDropKit
        product: PeerDropPet
      - target: PeerDropWidget
    settings:
      base:
        INFOPLIST_FILE: PeerDrop/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.hanfour.peerdrop
        DEVELOPMENT_TEAM: UK48R5KWLV
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "5.4.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: PeerDrop/App/PeerDrop.entitlements
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    entitlements:
      path: PeerDrop/App/PeerDrop.entitlements
      properties:
        # APNs capability — Apple maps "development" → "production"
        # automatically at archive time based on the signing profile, so
        # one value works for both TestFlight/App Store and dev builds.
        # Without this key iOS calls didFailToRegisterForRemoteNotifications
        # and the app never gets a device token.
        aps-environment: development
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.hanfour.peerdrop
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.hanfour.peerdrop
        com.apple.security.application-groups:
          - group.com.hanfour.peerdrop
        # Keychain access group: required for unit tests to use the
        # Security framework on simulator. Without this, every
        # `SecItemAdd` returns errSecMissingEntitlement (-34018) and
        # the IdentityKey / PreKey / ChatDataEncryptor / TrustedContact
        # test suites all fail by construction, taking ~16 dependent
        # tests with them. Single shared group; the team prefix
        # placeholder resolves at signing time.
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.hanfour.peerdrop
    info:
      path: PeerDrop/App/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: PeerDrop
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - peerdrop
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: "PeerDrop uses the local network to discover and connect to nearby devices for file transfer and voice calls."
        NSBonjourServices:
          - "_peerdrop._tcp"
        NSMicrophoneUsageDescription: "PeerDrop needs microphone access for voice calls."
        NSBluetoothAlwaysUsageDescription: "PeerDrop uses Bluetooth to discover nearby devices for file sharing."
        NSNearbyInteractionUsageDescription: "PeerDrop uses Nearby Interaction to measure the distance and direction of nearby devices for precise file sharing."
        NSCameraUsageDescription: "PeerDrop needs camera access to capture photos for sharing in chats."
        NSPhotoLibraryUsageDescription: "PeerDrop needs photo library access to share photos and videos in chats."
        PeerDropWorkerAPIKey: "$(PEERDROP_WORKER_API_KEY)"
        CryptoPolicyPublicKeys:
          - 2Mds2dPO3W7UYqwP32fiee4pIK2BPMzVxBfgAKT1nyk=
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - voip
          - bluetooth-central
          - bluetooth-peripheral
          - remote-notification
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown

  PeerDropMac:
    type: application
    platform: macOS
    sources:
      - path: PeerDropMac
      # Privacy Manifest — shared single source-of-truth with iOS so
      # both bundles declare the same NSPrivacyAccessedAPI reasons.
      # Notarization will reject Mac builds without this file.
      - path: PeerDrop/PrivacyInfo.xcprivacy
      # Reuse cross-platform views from the iOS UI tree.
      # iOS-only files excluded per M2 Task 1 audit.
      # Pet/UI reuse — needed by ChatView for the chat-side Pet overlay
      # (ChatPetOverlay). FloatingPetView is iOS-only (UIScreen +
      # UIPanGestureRecognizer); PetTabView relies on iOS-only
      # fullScreenCover sheet semantics for the welcome flow.
      - path: PeerDrop/Pet/UI
        excludes:
          - "FloatingPetView.swift"
          - "PetTabView.swift"
      - path: PeerDrop/UI
        excludes:
          # M3 un-excluded: Voice/** (gated via MacFeatureFlags) +
          # Settings/PushStatusRow (UIApplication → NSWorkspace gated).
          # M4 Task 1b un-excluded: UserProfileView / FilePickerView /
          # ConnectionQRView / RelayConnectView / MediaPreviewView /
          # ChatBubbleView / ChatView (all PlatformImage-refactored) +
          # NearbyTab + LibraryTab (chain deps now buildable).
          - "SettingsView.swift"                 # UIDevice — iOS-only; replaced by MacSettingsView
          - "Settings/DocumentPickerView.swift"  # iOS-only settings document picker; FilePickerView covers macOS needs
          - "Transfer/ClipboardShareView.swift"  # UIImage + UIPasteboard niche; not surfaced on macOS yet
          - "Chat/CameraPickerView.swift"        # UIImagePickerController — no macOS camera UI
          - "ContentView.swift"                  # iOS root TabView — replaced by MacContentView
          - "Settings/TipJarSection.swift"       # StoreKit IAP — Mac IAP attached separately via Playwright
          # iOS-shaped tab containers — replaced by MacContentView/MacDetailRouter:
          - "Connection/ConnectionView.swift"    # iOS tab container; macOS uses MacContentView
          - "Discovery/DiscoveryView.swift"      # iOS tab container
          - "Connection/ConnectedTab.swift"      # iOS tab container
    dependencies:
      - package: PeerDropKit
        product: PeerDropPlatform
      - package: PeerDropKit
        product: PeerDropCore
      - package: PeerDropKit
        product: PeerDropTransport
      - package: PeerDropKit
        product: PeerDropSecurity
      - package: PeerDropKit
        product: PeerDropProtocol
      - package: PeerDropKit
        product: PeerDropPet
    settings:
      base:
        INFOPLIST_FILE: PeerDropMac/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.hanfour.peerdrop.mac
        DEVELOPMENT_TEAM: UK48R5KWLV
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: PeerDropMac/App/PeerDrop-Mac.entitlements
        MARKETING_VERSION: "6.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SDKROOT: macosx
        ENABLE_HARDENED_RUNTIME: "YES"

  PeerDropTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PeerDropTests
        # Pet test files and their fixture zips moved to PeerDropPetTests (M1d-3b Task 6).
        # PeerDropTests/Pet/ directory removed; PeerDropTests/Resources/Pets/ removed.
        excludes:
          - "Pet/Fixtures/**"
    dependencies:
      - target: PeerDrop
      - package: PeerDropKit
        product: PeerDropPlatform
      - package: PeerDropKit
        product: PeerDropCore
      - package: PeerDropKit
        product: PeerDropTransport
      - package: PeerDropKit
        product: PeerDropSecurity
      - package: PeerDropKit
        product: PeerDropProtocol
      - package: PeerDropKit
        product: PeerDropPet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peerdrop.tests
        GENERATE_INFOPLIST_FILE: "YES"

  PeerDropUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - PeerDropUITests
    dependencies:
      - target: PeerDrop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peerdrop.uitests
        GENERATE_INFOPLIST_FILE: "YES"

  PeerDropMacUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - PeerDropMacUITests
    dependencies:
      - target: PeerDropMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peerdrop.mac.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        DEVELOPMENT_TEAM: UK48R5KWLV
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SDKROOT: macosx

  PeerDropWidget:
    type: app-extension
    platform: iOS
    sources:
      - PeerDropWidget
    dependencies:
      - package: PeerDropKit
        product: PeerDropPet
      - package: PeerDropKit
        product: PeerDropPlatform
    info:
      path: PeerDropWidget/Info.plist
      properties:
        CFBundleDisplayName: PeerDrop Widget
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hanfour.peerdrop.widget
        DEVELOPMENT_TEAM: UK48R5KWLV
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "5.4.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: PeerDropWidget/PeerDropWidget.entitlements
    entitlements:
      path: PeerDropWidget/PeerDropWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.hanfour.peerdrop

schemes:
  PeerDrop:
    build:
      targets:
        PeerDrop: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PeerDropTests
    profile:
      config: Release
    archive:
      config: Release

  PeerDropUITests:
    build:
      targets:
        PeerDrop: all
        PeerDropUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PeerDropUITests

  PeerDropMac:
    build:
      targets:
        PeerDropMac: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release

  PeerDropMacUITests:
    build:
      targets:
        PeerDropMac: all
        PeerDropMacUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PeerDropMacUITests
