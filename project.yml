name: PeerDrop
options:
  bundleIdPrefix: com.peerdrop
  deploymentTarget:
    iOS: "16.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  # WebRTC + ZIPFoundation are no longer declared at the project level —
  # both reach the app target transitively via PeerDropKit (WebRTC via
  # PeerDropTransport, ZIPFoundation via PeerDropPet). Pinned versions
  # live in PeerDropKit/Package.swift.
  PeerDropKit:
    path: PeerDropKit

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"  # iPhone and iPad
    SWIFT_EMIT_LOC_STRINGS: "NO"

targets:
  PeerDrop:
    type: application
    platform: iOS
    sources:
      - path: PeerDrop
    dependencies:
      - package: PeerDropKit
        product: PeerDropPlatform
      - package: PeerDropKit
        product: PeerDropCore
      - package: PeerDropKit
        product: PeerDropTransport
      - package: PeerDropKit
        product: PeerDropSecurity
      - package: PeerDropKit
        product: PeerDropProtocol
      - package: PeerDropKit
        product: PeerDropPet
      - target: PeerDropWidget
    settings:
      base:
        INFOPLIST_FILE: PeerDrop/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.hanfour.peerdrop
        DEVELOPMENT_TEAM: UK48R5KWLV
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "5.4.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: PeerDrop/App/PeerDrop.entitlements
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    entitlements:
      path: PeerDrop/App/PeerDrop.entitlements
      properties:
        # APNs capability — Apple maps "development" → "production"
        # automatically at archive time based on the signing profile, so
        # one value works for both TestFlight/App Store and dev builds.
        # Without this key iOS calls didFailToRegisterForRemoteNotifications
        # and the app never gets a device token.
        aps-environment: development
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.hanfour.peerdrop
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.hanfour.peerdrop
        com.apple.security.application-groups:
          - group.com.hanfour.peerdrop
        # Keychain access group: required for unit tests to use the
        # Security framework on simulator. Without this, every
        # `SecItemAdd` returns errSecMissingEntitlement (-34018) and
        # the IdentityKey / PreKey / ChatDataEncryptor / TrustedContact
        # test suites all fail by construction, taking ~16 dependent
        # tests with them. Single shared group; the team prefix
        # placeholder resolves at signing time.
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.hanfour.peerdrop
    info:
      path: PeerDrop/App/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: PeerDrop
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - peerdrop
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: "PeerDrop uses the local network to discover and connect to nearby devices for file transfer and voice calls."
        NSBonjourServices:
          - "_peerdrop._tcp"
        NSMicrophoneUsageDescription: "PeerDrop needs microphone access for voice calls."
        NSBluetoothAlwaysUsageDescription: "PeerDrop uses Bluetooth to discover nearby devices for file sharing."
        NSNearbyInteractionUsageDescription: "PeerDrop uses Nearby Interaction to measure the distance and direction of nearby devices for precise file sharing."
        NSCameraUsageDescription: "PeerDrop needs camera access to capture photos for sharing in chats."
        NSPhotoLibraryUsageDescription: "PeerDrop needs photo library access to share photos and videos in chats."
        PeerDropWorkerAPIKey: "$(PEERDROP_WORKER_API_KEY)"
        CryptoPolicyPublicKeys:
          - 2Mds2dPO3W7UYqwP32fiee4pIK2BPMzVxBfgAKT1nyk=
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - voip
          - bluetooth-central
          - bluetooth-peripheral
          - remote-notification
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown

  PeerDropMac:
    type: application
    platform: macOS
    sources:
      - path: PeerDropMac
      # Reuse cross-platform views from the iOS UI tree.
      # iOS-only files excluded per M2 Task 1 audit.
      - path: PeerDrop/UI
        excludes:
          - "Voice/**"                          # M3 ships voice; M2 hides
          - "SettingsView.swift"                 # UIDevice (Task 6 REPLACE)
          - "Settings/DocumentPickerView.swift"  # UIDocumentPickerViewController (Task 6 REPLACE)
          - "Settings/UserProfileView.swift"     # UIImage avatar (Task 6 REPLACE)
          - "Settings/PushStatusRow.swift"       # Push notifications (M3 territory)
          - "Transfer/FilePickerView.swift"      # UIDocumentPickerViewController (Task 6 REPLACE)
          - "Transfer/ClipboardShareView.swift"  # UIImage + UIPasteboard (Task 6 REPLACE)
          - "Chat/CameraPickerView.swift"        # UIImagePickerController (iOS-only camera)
          - "Chat/ChatView.swift"                # PhotosUI picker (iOS-only)
          - "ContentView.swift"                  # iOS root TabView (replaced by MacContentView in Task 5)
          - "Settings/TipJarSection.swift"       # TipJarManager (StoreKit IAP, iOS-only)
          - "Connection/ConnectionQRView.swift"  # UIImage + UIPasteboard QR rendering (Task 6 REPLACE)
          - "Chat/MediaPreviewView.swift"        # UIImage media decoding (Task 6 REPLACE)
          - "Relay/RelayConnectView.swift"       # UIImage QR rendering (Task 6 REPLACE)
          # The following use surface-level iOS-only APIs (navigationBarTitleDisplayMode,
          # UIApplication.openSettingsURL, UIImage thumbnails). They'll be re-included
          # in later tasks via #if os(iOS) gates or platform-conditional view modifiers.
          - "Chat/ChatBubbleView.swift"          # navigationBarTitleDisplayMode + UIImage thumbs
          - "Chat/ChatSearchView.swift"          # navigationBarTitleDisplayMode
          - "Chat/GroupChatView.swift"           # navigationBarTitleDisplayMode
          - "Chat/GroupReadReceiptView.swift"    # navigationBarTitleDisplayMode
          - "Connection/ManualConnectView.swift" # navigationBarTitleDisplayMode
          - "Discovery/ConnectionOptionsSheet.swift"  # navigationBarTitleDisplayMode
          - "Discovery/GuidanceCard.swift"       # UIApplication.shared.open
          - "Library/AssignGroupSheet.swift"     # navigationBarTitleDisplayMode
          - "Library/GroupDetailView.swift"      # navigationBarTitleDisplayMode
          - "Library/GroupEditorView.swift"     # navigationBarTitleDisplayMode
          - "Relay/DevicePickerView.swift"       # navigationBarTitleDisplayMode
          - "Relay/PINVerificationView.swift"    # navigationBarTitleDisplayMode
          - "Security/FirstContactVerificationSheet.swift"  # navigationBarTitleDisplayMode
          - "Security/InviteAcceptView.swift"    # navigationBarTitleDisplayMode
          - "Security/SecurityDashboardView.swift"  # navigationBarTitleDisplayMode
          - "Settings/BackupRecordListView.swift"   # navigationBarTitleDisplayMode
          - "Settings/TailnetPeersView.swift"    # navigationBarTitleDisplayMode
          - "Transfer/TransferHistoryView.swift" # navigationBarTitleDisplayMode
          - "Components/StatusToastView.swift"   # Color(.label) UIKit semantic color
          - "Chat/TypingIndicatorView.swift"     # Color(.systemGray6) UIKit semantic color
          - "OnboardingView.swift"               # TabView .page style (iOS-only)
          - "Components/ToastView.swift"         # Color(.label) UIKit semantic color
          - "Connection/ConsentSheet.swift"      # Color(.secondarySystemBackground) UIKit semantic color
          - "Chat/ReactionPickerView.swift"      # Color(.systemGray6) UIKit semantic color
          - "Components/ConnectionStatusHeaderView.swift"  # UIKit semantic color
          # Downstream of excluded views — Task 5 introduces a macOS-specific
          # container so these iOS-shaped tab containers aren't needed here.
          - "Connection/ConnectionView.swift"    # references ToastView
          - "Discovery/DiscoveryView.swift"      # references TailnetPeersView + ManualConnectView
          - "Discovery/NearbyTab.swift"          # references GuidanceCard, ManualConnectView, ConnectionQRView, etc.
          - "Library/LibraryTab.swift"           # references GroupEditorView + GroupDetailView
          - "Connection/ConnectedTab.swift"      # references ConnectionView
    dependencies:
      - package: PeerDropKit
        product: PeerDropPlatform
      - package: PeerDropKit
        product: PeerDropCore
      - package: PeerDropKit
        product: PeerDropTransport
      - package: PeerDropKit
        product: PeerDropSecurity
      - package: PeerDropKit
        product: PeerDropProtocol
      - package: PeerDropKit
        product: PeerDropPet
    settings:
      base:
        INFOPLIST_FILE: PeerDropMac/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.hanfour.peerdrop.mac
        DEVELOPMENT_TEAM: UK48R5KWLV
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: PeerDropMac/App/PeerDrop-Mac.entitlements
        MARKETING_VERSION: "6.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SDKROOT: macosx
        ENABLE_HARDENED_RUNTIME: "YES"

  PeerDropTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PeerDropTests
        # Pet test files and their fixture zips moved to PeerDropPetTests (M1d-3b Task 6).
        # PeerDropTests/Pet/ directory removed; PeerDropTests/Resources/Pets/ removed.
        excludes:
          - "Pet/Fixtures/**"
    dependencies:
      - target: PeerDrop
      - package: PeerDropKit
        product: PeerDropPlatform
      - package: PeerDropKit
        product: PeerDropCore
      - package: PeerDropKit
        product: PeerDropTransport
      - package: PeerDropKit
        product: PeerDropSecurity
      - package: PeerDropKit
        product: PeerDropProtocol
      - package: PeerDropKit
        product: PeerDropPet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peerdrop.tests
        GENERATE_INFOPLIST_FILE: "YES"

  PeerDropUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - PeerDropUITests
    dependencies:
      - target: PeerDrop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peerdrop.uitests
        GENERATE_INFOPLIST_FILE: "YES"

  PeerDropWidget:
    type: app-extension
    platform: iOS
    sources:
      - PeerDropWidget
    dependencies:
      - package: PeerDropKit
        product: PeerDropPet
      - package: PeerDropKit
        product: PeerDropPlatform
    info:
      path: PeerDropWidget/Info.plist
      properties:
        CFBundleDisplayName: PeerDrop Widget
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hanfour.peerdrop.widget
        DEVELOPMENT_TEAM: UK48R5KWLV
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "5.4.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: PeerDropWidget/PeerDropWidget.entitlements
    entitlements:
      path: PeerDropWidget/PeerDropWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.hanfour.peerdrop

schemes:
  PeerDrop:
    build:
      targets:
        PeerDrop: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PeerDropTests
    profile:
      config: Release
    archive:
      config: Release

  PeerDropUITests:
    build:
      targets:
        PeerDrop: all
        PeerDropUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PeerDropUITests
