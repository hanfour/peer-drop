name: PeerDrop
options:
  bundleIdPrefix: com.peerdrop
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC
    exactVersion: 125.0.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"  # iPhone and iPad
    SWIFT_EMIT_LOC_STRINGS: "NO"

targets:
  PeerDrop:
    type: application
    platform: iOS
    sources:
      - PeerDrop
    dependencies:
      - package: WebRTC
    settings:
      base:
        INFOPLIST_FILE: PeerDrop/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.hanfour.peerdrop
        DEVELOPMENT_TEAM: UK48R5KWLV
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        PEERDROP_WORKER_API_KEY: "f9ecf9c66fc765696d943ebe97e21dbfccd816c83cec08fe14a4683441a044df"
    info:
      path: PeerDrop/App/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: PeerDrop
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: "PeerDrop uses the local network to discover and connect to nearby devices for file transfer and voice calls."
        NSBonjourServices:
          - "_peerdrop._tcp"
        NSMicrophoneUsageDescription: "PeerDrop needs microphone access for voice calls."
        NSBluetoothAlwaysUsageDescription: "PeerDrop uses Bluetooth to discover nearby devices for file sharing."
        NSNearbyInteractionUsageDescription: "PeerDrop uses Nearby Interaction to measure the distance and direction of nearby devices for precise file sharing."
        NSCameraUsageDescription: "PeerDrop needs camera access to capture photos for sharing in chats."
        NSPhotoLibraryUsageDescription: "PeerDrop needs photo library access to share photos and videos in chats."
        PeerDropWorkerAPIKey: "$(PEERDROP_WORKER_API_KEY)"
        UIBackgroundModes:
          - voip
          - bluetooth-central
          - bluetooth-peripheral
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown

  PeerDropTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PeerDropTests
    dependencies:
      - target: PeerDrop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peerdrop.tests
        GENERATE_INFOPLIST_FILE: "YES"

  PeerDropUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - PeerDropUITests
    dependencies:
      - target: PeerDrop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peerdrop.uitests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  PeerDrop:
    build:
      targets:
        PeerDrop: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PeerDropTests
    profile:
      config: Release
    archive:
      config: Release

  PeerDropUITests:
    build:
      targets:
        PeerDrop: all
        PeerDropUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PeerDropUITests
