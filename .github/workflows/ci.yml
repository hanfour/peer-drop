name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-imports:
    name: Lint — no UIKit in Core/ or Pet/ (non-UI)
    runs-on: macos-15
    continue-on-error: false  # enforced from M1a onward
    steps:
      - uses: actions/checkout@v4

      - name: Scan for unguarded UIKit/AppKit/WidgetKit imports in Core/, Pet/ (non-UI), and Voice/ (excl. CallKitManager)
        run: |
          set -e
          violations=""
          while IFS= read -r file; do
            if grep -E "^import (UIKit|AppKit|WidgetKit)" "$file" > /dev/null 2>&1; then
              while IFS= read -r line_no; do
                prev_line=$((line_no - 1))
                prev=$(sed -n "${prev_line}p" "$file" | tr -d '[:space:]')
                # Accept both #if and #elseif guard forms
                if [ "$prev" != "#ifos(iOS)" ] && \
                   [ "$prev" != "#ifcanImport(UIKit)" ] && \
                   [ "$prev" != "#ifcanImport(AppKit)" ] && \
                   [ "$prev" != "#ifcanImport(WidgetKit)" ] && \
                   [ "$prev" != "#elseifcanImport(UIKit)" ] && \
                   [ "$prev" != "#elseifcanImport(AppKit)" ] && \
                   [ "$prev" != "#elseifcanImport(WidgetKit)" ] && \
                   [ "$prev" != "#elseifos(iOS)" ]; then
                  violations+="$file:$line_no: $(sed -n "${line_no}p" "$file")\n"
                fi
              done < <(grep -n -E "^import (UIKit|AppKit|WidgetKit)" "$file" | cut -d: -f1)
            fi
          done < <(find PeerDrop/Pet PeerDropKit/Sources -name "*.swift" \
            -not -path "*/Platform/iOS/*" \
            -not -path "*/Pet/UI/*")
          if [ -n "$violations" ]; then
            echo "::error::Unguarded UI-framework imports in Pet/ (non-UI) or PeerDropKit/Sources/:"
            printf "%b" "$violations"
            exit 1
          else
            echo "Clean: PeerDrop/Pet/ (non-UI) and PeerDropKit/Sources/ have no unguarded UI-framework imports."
          fi

  swift-build-macos:
    name: Swift build (macOS host) — PeerDropKit compile gate
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: swift build from PeerDropKit/
        working-directory: PeerDropKit
        run: |
          swift build 2>&1
          # Exit code propagates: any compile failure (including
          # accidental iOS-only API usage in PeerDropKit/Sources/)
          # fails the job and blocks the PR.
