name = "peerdrop-signal"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
# Set TURN_KEY_ID via `wrangler secret put TURN_KEY_ID`
# Set TURN_API_TOKEN via `wrangler secret put TURN_API_TOKEN`
# Set APNS_KEY_P8 via `cat AuthKey.p8 | wrangler secret put APNS_KEY_P8`
# Set APNS_KEY_ID via `wrangler secret put APNS_KEY_ID`
# Set APNS_TEAM_ID via `wrangler secret put APNS_TEAM_ID`
# Set APNS_BUNDLE_ID via `wrangler secret put APNS_BUNDLE_ID`

[[kv_namespaces]]
binding = "ROOMS"
id = "376d9f22d4c743bfb1509b814087192c"

[[kv_namespaces]]
binding = "V2_STORE"
id = "9968f53e396f441da9e9fa419285ed68"

[[durable_objects.bindings]]
name = "SIGNALING_ROOM"
class_name = "SignalingRoom"

[[durable_objects.bindings]]
name = "PREKEY_STORE"
class_name = "PreKeyStore"

[[durable_objects.bindings]]
name = "DEVICE_INBOX"
class_name = "DeviceInbox"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SignalingRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["PreKeyStore"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["DeviceInbox"]
